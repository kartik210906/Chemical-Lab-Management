<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="std.css">

<style>

.login-box{
    background:white;
    border-radius:16px;
    padding:25px;
    border:1px solid #ddd;
    margin-top:40px;
}

.login-box h2{
    margin-bottom:10px;
}

.login-box p{
    color:#666;
    font-size:14px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:15px;
    font-size:14px;
}

.login-btn{
    width:100%;
    border:none;
    background:#4f46e5;
    color:white;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
}

.login-btn:hover{
    opacity:0.9;
}

.error{
    margin-top:15px;
    color:#d32f2f;
    font-size:14px;
    display:none;
}

.success{
    margin-top:15px;
    color:#2e7d32;
    font-size:14px;
    display:none;
}

</style>

</head>

<body>

<section>

<div class="login-box">

    <h2>🔐 Admin Login</h2>

    <p>
        Enter admin credentials to access dashboard.
    </p>

    <input type="text"
    id="username"
    placeholder="Admin Username">

    <input type="password"
    id="password"
    placeholder="Password">

    <button class="login-btn"
    onclick="loginAdmin()">

        Login

    </button>

    <div class="error" id="error">
        Invalid username or password
    </div>

    <div class="success" id="success">
        Login successful...
    </div>

</div>

</section>

<script>

function loginAdmin(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    let error =
    document.getElementById("error");

    let success =
    document.getElementById("success");

    if(username == "admin" && password == "lab123"){

        error.style.display = "none";

        success.style.display = "block";

        setTimeout(function(){

            window.location.href = "admin.html";

        },1000);

    }

    else{

        success.style.display = "none";

        error.style.display = "block";

    }

}

</script>

</body>
</html>
