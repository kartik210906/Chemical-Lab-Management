<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Lab Schedule</title>

<link rel="stylesheet" href="std.css">

<style>

.schedule-card{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:12px;
}

.schedule-card h3{
    margin-bottom:10px;
}

.schedule-card p{
    font-size:14px;
    margin-bottom:5px;
    color:#555;
}

.empty-box{
    background:white;
    border-radius:10px;
    padding:20px;
    text-align:center;
}

</style>

</head>

<body>

<section>

<div>

    <h1>Lab Schedule</h1>

    <p class="subtitle">
        View laboratory schedules
    </p>

</div>

<div id="scheduleList"></div>

</section>

<script>

let schedules =
JSON.parse(localStorage.getItem("schedules")) || [];

let list =
document.getElementById("scheduleList");

if(schedules.length == 0){

    list.innerHTML = `

    <div class="empty-box">

        No schedules available

    </div>

    `;

}

else{

    schedules.forEach((s)=>{

        list.innerHTML += `

        <div class="schedule-card">

            <h3>${s.subject}</h3>

            <p><b>Date:</b> ${s.date}</p>

            <p>
            <b>Time:</b>
            ${s.startTime} - ${s.endTime}
            </p>

            <p><b>Batch:</b> ${s.batch}</p>

            <p><b>Lab:</b> ${s.lab}</p>

        </div>

        `;

    });

}

</script>

</body>
</html>
