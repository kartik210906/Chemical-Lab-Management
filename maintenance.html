<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Maintenance Log</title>

<link rel="stylesheet" href="std.css">

<style>

.form-box,
.log-card{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
}

input,
select{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.add-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
}

.delete-btn{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:red;
    color:white;
    cursor:pointer;
}

.log-card p{
    font-size:14px;
    margin-bottom:5px;
    color:#555;
}

</style>

</head>

<body>

<section>

<div>

    <h1>Maintenance Log</h1>

    <p class="subtitle">
        Track equipment maintenance
    </p>

</div>

<div class="form-box">

    <input type="text"
    id="equipment"
    placeholder="Equipment Name">

    <input type="text"
    id="issue"
    placeholder="Issue">

    <select id="status">

        <option value="">Select Status</option>

        <option>Working</option>
        <option>Under Repair</option>
        <option>Fixed</option>

    </select>

    <input type="date"
    id="repairDate">

    <button class="add-btn"
    onclick="addLog()">

        Add Log

    </button>

</div>

<div id="logList"></div>

</section>

<script>

let logs =
JSON.parse(localStorage.getItem("logs")) || [];

displayLogs();

function addLog(){

    let equipment =
    document.getElementById("equipment").value;

    let issue =
    document.getElementById("issue").value;

    let status =
    document.getElementById("status").value;

    let repairDate =
    document.getElementById("repairDate").value;

    if(equipment=="" ||
       issue=="" ||
       status=="" ||
       repairDate==""){

        alert("Fill all fields");

        return;

    }

    logs.push({

        equipment:equipment,
        issue:issue,
        status:status,
        repairDate:repairDate

    });

    localStorage.setItem(
    "logs",
    JSON.stringify(logs)
    );

    displayLogs();

}

function displayLogs(){

    let list =
    document.getElementById("logList");

    list.innerHTML = "";

    logs.forEach((l,index)=>{

        list.innerHTML += `

        <div class="log-card">

            <h3>${l.equipment}</h3>

            <p><b>Issue:</b> ${l.issue}</p>

            <p><b>Status:</b> ${l.status}</p>

            <p><b>Repair Date:</b> ${l.repairDate}</p>

            <button class="delete-btn"
            onclick="deleteLog(${index})">

                Delete

            </button>

        </div>

        `;

    });

}

function deleteLog(index){

    logs.splice(index,1);

    localStorage.setItem(
    "logs",
    JSON.stringify(logs)
    );

    displayLogs();

}

</script>

</body>
</html>
