<!DOCTYPE html>
<html>
<head>
    <title>Chemical Lab Website - Login</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a5acd, #8a2be2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            margin-bottom: 20px;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 95%;
            padding: 10px;
            background: #6a5acd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #5a4abf;
        }

        .footer{
            margin-top: 10px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>🧪 Chemical Finder</h2>

    <form>
        <input type="text" placeholder="Username" required><br>
        <input type="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Chemistry Lab Information System
    </div>
</div>

</body>
</html>
